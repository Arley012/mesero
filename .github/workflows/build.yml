name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Corregir formato de gradlew
        run: sed -i 's/\r//' MeseroApp/gradlew

      - name: Dar permisos a Gradle
        run: chmod +x MeseroApp/gradlew

      - name: Compilar APK debug
        working-directory: MeseroApp
        run: ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: MeseroApp/app/build/outputs/apk/debug/app-debug.apk
